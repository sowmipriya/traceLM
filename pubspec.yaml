name: tracelm
description: "TraceLM — cross-platform LLM usage monitor with quota alerts."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3
  path: ^1.9.0
  intl: ^0.19.0
  http: ^1.2.1
  flutter_local_notifications: ^17.2.2
  tray_manager: ^0.2.3
  window_manager: ^0.3.9
  launch_at_startup: ^0.3.2
  url_launcher: ^6.3.0
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/pricing.json
    - assets/providers/
